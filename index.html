<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wifi Group - العجلة الذهبية</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue-deep: #0A1628;
    --blue-brand: #1565C0;
    --blue-bright: #1E88E5;
    --blue-glow: #42A5F5;
    --gold: #FFD700;
    --gold-dark: #FFA000;
    --white: #FFFFFF;
    --white-soft: #E3F2FD;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--blue-deep);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background particles */
  .bg-glow {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(21,101,192,0.4) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 100% 100%, rgba(30,136,229,0.2) 0%, transparent 60%),
      radial-gradient(ellipse 30% 40% at 0% 80%, rgba(21,101,192,0.15) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    width: 100%;
    max-width: 480px;
  }

  /* Logo */
  .logo-area {
    text-align: center;
    margin-bottom: 16px;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50px;
    padding: 8px 20px;
    margin-bottom: 12px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: 1px;
  }

  .logo-text span {
    color: var(--gold);
  }

  .headline {
    font-size: 26px;
    font-weight: 900;
    color: var(--white);
    text-align: center;
    line-height: 1.3;
  }

  .headline span {
    color: var(--gold);
    display: block;
  }

  .subline {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    margin-top: 6px;
  }

  /* Wheel wrapper */
  .wheel-wrapper {
    position: relative;
    width: 320px;
    height: 320px;
    margin: 24px 0 16px;
  }

  /* Pointer */
  .pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 30px solid var(--gold);
    filter: drop-shadow(0 0 8px rgba(255,215,0,0.8));
    z-index: 10;
  }

  .pointer::after {
    content: '';
    position: absolute;
    top: -36px;
    left: -10px;
    width: 20px;
    height: 10px;
    background: var(--gold-dark);
    border-radius: 4px 4px 0 0;
  }

  canvas#wheel {
    border-radius: 50%;
    box-shadow:
      0 0 0 4px rgba(255,215,0,0.3),
      0 0 0 8px rgba(21,101,192,0.4),
      0 8px 40px rgba(0,0,0,0.6);
    display: block;
  }

  /* Center circle */
  .center-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: 4px solid var(--white);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    font-weight: 900;
    color: var(--blue-deep);
    box-shadow: 0 0 20px rgba(255,215,0,0.6);
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 10;
    text-align: center;
    line-height: 1.2;
  }

  .center-btn:hover:not(:disabled) {
    transform: translate(-50%, -50%) scale(1.08);
    box-shadow: 0 0 30px rgba(255,215,0,0.9);
  }

  .center-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Spin button */
  .spin-btn {
    background: linear-gradient(135deg, var(--blue-brand), var(--blue-bright));
    color: var(--white);
    font-family: 'Cairo', sans-serif;
    font-size: 18px;
    font-weight: 900;
    padding: 14px 48px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(21,101,192,0.5);
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .spin-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(21,101,192,0.7);
  }

  .spin-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .remaining {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    margin-top: 10px;
  }

  /* Result overlay */
  .result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,22,40,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }

  .result-overlay.show {
    display: flex;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .result-card {
    background: linear-gradient(145deg, #0D1E3A, #162B52);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
    max-width: 340px;
    width: 90%;
    box-shadow: 0 0 60px rgba(255,215,0,0.15), 0 20px 60px rgba(0,0,0,0.5);
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .result-emoji {
    font-size: 56px;
    margin-bottom: 12px;
    display: block;
  }

  .result-title {
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .result-code {
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 2px;
    background: rgba(255,215,0,0.08);
    border: 1px solid rgba(255,215,0,0.25);
    border-radius: 12px;
    padding: 14px 20px;
    margin: 12px 0 20px;
    font-family: 'Courier New', monospace;
    word-break: break-all;
  }

  .result-note {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .copy-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--blue-deep);
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 900;
    padding: 12px 36px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    width: 100%;
    margin-bottom: 10px;
  }

  .close-btn {
    background: transparent;
    color: rgba(255,255,255,0.4);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    padding: 8px;
    border: none;
    cursor: pointer;
    width: 100%;
  }

  /* Empty state */
  .empty-msg {
    display: none;
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    padding: 12px;
  }

  @media (max-width: 360px) {
    .wheel-wrapper { width: 280px; height: 280px; }
    canvas#wheel { width: 280px !important; height: 280px !important; }
    .headline { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
  <div class="logo-area">
    <div class="logo-badge">
      <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" fill="#1565C0"/>
        <path d="M8 16 Q16 8 24 16 Q16 24 8 16Z" fill="white" opacity="0.9"/>
        <circle cx="16" cy="16" r="3" fill="#FFD700"/>
      </svg>
      <span class="logo-text">WIFI <span>GROUP</span></span>
    </div>
    <h1 class="headline">العجلة الذهبية 🎡<span>اربح كود خصمك دلوقتي!</span></h1>
    <p class="subline">لف العجلة واكسب كود خصم حصري</p>
  </div>

  <div class="wheel-wrapper">
    <div class="pointer"></div>
    <canvas id="wheel" width="320" height="320"></canvas>
    <button class="center-btn" id="centerBtn" onclick="spin()"></button>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">🎯 لف دلوقتي!</button>
  <p class="remaining" id="remaining">50 كود خصم متاح</p>
  <p class="empty-msg" id="emptyMsg">🎉 كل الأكواد اتوزعت! شكراً للجميع</p>
</div>

<!-- Result Modal -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <span class="result-emoji">🎉</span>
    <p class="result-title">مبروك! كودك الحصري:</p>
    <div class="result-code" id="resultCode">WIFI-XXXXXXXX</div>
    <p class="result-note">احتفظ بالكود ده واستخدمه عند الشراء<br>من Wifi Group للحصول على خصمك</p>
    <button class="copy-btn" onclick="copyCode()">📋 انسخ الكود</button>
    <button class="close-btn" onclick="closeResult()">إغلاق</button>
  </div>
</div>

<script>
const ALL_CODES = [
  'WIFI-EO08X4HF','WIFI-AOHUKYFT','WIFI-8N9QIL3B','WIFI-5PW8AR7W','WIFI-YJEJA54A',
  'WIFI-K7VQSNWR','WIFI-LKJ8D1LA','WIFI-KAGB5FIA','WIFI-2YF5AQ6P','WIFI-LHEHT9ND',
  'WIFI-662W0ZEG','WIFI-9WE7HYZ2','WIFI-DEQD6KTK','WIFI-J87AZXOJ','WIFI-5QVKUZ4A',
  'WIFI-EUT3UE60','WIFI-E1777X3P','WIFI-PCABHVQN','WIFI-7X5OF06X','WIFI-IUJS37SZ',
  'WIFI-3SN2BSB6','WIFI-UWZAW0EV','WIFI-90GMMIWO','WIFI-XCJ2X8E2','WIFI-NA9FTAGA',
  'WIFI-PSWUB9OV','WIFI-L92ZN4VS','WIFI-7XPNG1BG','WIFI-WLEFGI7T','WIFI-3UU5X0CV',
  'WIFI-Q8G7RRI4','WIFI-BWECJJOO','WIFI-I1FGTDK5','WIFI-URP23TYJ','WIFI-ORS1Q5YE',
  'WIFI-YD2RDT0C','WIFI-RF6SSOON','WIFI-CL5T1FX5','WIFI-WDSSMBP7','WIFI-MGI9BUW9',
  'WIFI-VDTQW9EA','WIFI-US63UO7S','WIFI-RLOTCINZ','WIFI-N4EIHNF7','WIFI-ZU9H7YQD',
  'WIFI-A2OIHIXI','WIFI-FBFCK8WZ','WIFI-WCZVNYC1','WIFI-OQHNX1LN','WIFI-UJ0WFMFS'
];

// Load used codes from localStorage
let usedCodes = JSON.parse(localStorage.getItem('wg_used') || '[]');
let available = ALL_CODES.filter(c => !usedCodes.includes(c));

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const SIZE = 320;
const cx = SIZE / 2, cy = SIZE / 2, R = SIZE / 2 - 4;

// Colors alternating blue shades
const COLORS = [
  '#1565C0','#1976D2','#1E88E5','#2196F3',
  '#0D47A1','#1565C0','#1976D2','#0A3880'
];

let currentAngle = 0;
let isSpinning = false;
let wonCode = null;

function getSlices() { return available; }

function drawWheel(angle) {
  const slices = getSlices();
  const n = slices.length;
  if (n === 0) return;

  ctx.clearRect(0, 0, SIZE, SIZE);
  const arc = (2 * Math.PI) / n;

  slices.forEach((code, i) => {
    const start = angle + i * arc;
    const end = start + arc;

    // Slice
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, start, end);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Text — show short label
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';

    const distFromCenter = R * 0.75;
    const shortCode = code.replace('WIFI-', '');
    const fontSize = n > 20 ? 10 : n > 10 ? 12 : 14;
    ctx.font = `bold ${fontSize}px "Courier New", monospace`;
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 3;
    ctx.fillText(shortCode, distFromCenter, 4);
    ctx.shadowBlur = 0;
    ctx.restore();
  });

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(255,215,0,0.6)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Inner dots on rim
  const n2 = Math.min(slices.length * 2, 80);
  for (let i = 0; i < n2; i++) {
    const a = (i / n2) * 2 * Math.PI + angle;
    const dx = cx + (R - 8) * Math.cos(a);
    const dy = cy + (R - 8) * Math.sin(a);
    ctx.beginPath();
    ctx.arc(dx, dy, 2, 0, 2 * Math.PI);
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,215,0,0.7)' : 'rgba(255,255,255,0.3)';
    ctx.fill();
  }

  // Center cover (drawn by button element on top)
}

function updateUI() {
  const n = available.length;
  const rem = document.getElementById('remaining');
  const emptyMsg = document.getElementById('emptyMsg');
  const spinBtn = document.getElementById('spinBtn');
  const centerBtn = document.getElementById('centerBtn');

  rem.textContent = `${n} كود خصم متاح`;

  if (n === 0) {
    rem.style.display = 'none';
    emptyMsg.style.display = 'block';
    spinBtn.disabled = true;
    centerBtn.disabled = true;
  } else {
    rem.style.display = 'block';
    emptyMsg.style.display = 'none';
    spinBtn.disabled = false;
    centerBtn.disabled = false;
  }
}

function spin() {
  if (isSpinning || available.length === 0) return;
  isSpinning = true;

  document.getElementById('spinBtn').disabled = true;
  document.getElementById('centerBtn').disabled = true;

  // Pick random winner
  const winnerIdx = Math.floor(Math.random() * available.length);
  wonCode = available[winnerIdx];

  const n = available.length;
  const arc = (2 * Math.PI) / n;
  // Target: winner slice should be at top (angle = -π/2)
  // Winner center angle from 0 = winnerIdx * arc + arc/2
  // We need currentAngle + winnerIdx * arc + arc/2 ≡ -π/2 (mod 2π) after spin
  // So target rotation = -π/2 - winnerIdx * arc - arc/2 - currentAngle
  const spins = 5 + Math.random() * 4; // 5-9 full rotations
  const targetAngle = currentAngle - (spins * 2 * Math.PI) - (winnerIdx * arc + arc / 2) - currentAngle % (2 * Math.PI) + (-Math.PI / 2 - (currentAngle % (2 * Math.PI)));

  // Simpler: just spin a lot and land on winner
  const totalRotation = spins * 2 * Math.PI + (2 * Math.PI - ((currentAngle + winnerIdx * arc + arc / 2 + Math.PI / 2) % (2 * Math.PI)));
  const startAngle = currentAngle;
  const endAngle = startAngle - totalRotation;

  const duration = 4000 + Math.random() * 1500;
  const startTime = performance.now();

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = easeOut(progress);

    currentAngle = startAngle + (endAngle - startAngle) * eased;
    drawWheel(currentAngle);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = endAngle;
      isSpinning = false;
      // Mark as used
      usedCodes.push(wonCode);
      localStorage.setItem('wg_used', JSON.stringify(usedCodes));
      available = ALL_CODES.filter(c => !usedCodes.includes(c));
      drawWheel(currentAngle);
      updateUI();
      setTimeout(showResult, 400);
    }
  }

  requestAnimationFrame(animate);
}

function showResult() {
  document.getElementById('resultCode').textContent = wonCode;
  document.getElementById('resultOverlay').classList.add('show');
}

function closeResult() {
  document.getElementById('resultOverlay').classList.remove('show');
}

function copyCode() {
  navigator.clipboard.writeText(wonCode).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ اتنسخ!';
    setTimeout(() => btn.textContent = '📋 انسخ الكود', 2000);
  });
}

// Init
drawWheel(currentAngle);
updateUI();
</script>
</body>
</html>
